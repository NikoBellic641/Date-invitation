<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Date Invitation ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

    select,
input{

width:100%;
padding:12px;

border:none;

border-radius:15px;

font-size:16px;

margin-top:5px;

}

#continue{

width:100%;

margin-top:20px;

background:#ff4d8d;

color:white;

font-weight:bold;

}

#continue:hover{

transform:scale(1.03);

}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;

background:linear-gradient(135deg,#ffd6e7,#ffeccf);

}

body::before{

content:"";
position:absolute;
width:600px;
height:600px;
background:#ff8db3;
filter:blur(180px);
top:-200px;
left:-150px;
opacity:.4;

}

body::after{

content:"";
position:absolute;
width:500px;
height:500px;
background:#ffc36b;
filter:blur(180px);
bottom:-150px;
right:-100px;
opacity:.3;

}

.card{

position:relative;
z-index:2;

width:420px;

background:rgba(255,255,255,.25);

backdrop-filter:blur(20px);

border-radius:30px;

padding:40px;

text-align:center;

box-shadow:0 20px 40px rgba(0,0,0,.15);

animation:show .8s ease;

}

@keyframes show{

from{

opacity:0;
transform:translateY(40px);

}

to{

opacity:1;
transform:translateY(0);

}

}

h1{

font-size:34px;
color:#ff4d8d;

margin-bottom:10px;

}

p{

color:#555;
margin-bottom:30px;

}

.buttons{

display:flex;
justify-content:center;
gap:20px;

}

button{

border:none;

padding:16px 35px;

border-radius:50px;

font-size:18px;

cursor:pointer;

transition:.35s cubic-bezier(.175,.885,.32,1.275);

}


#yes{

background:#ff4d8d;
color:white;

}

#yes:hover{

transform:scale(1.08);

}

#no{

background:white;

}

#no:hover{

background:#f4f4f4;

}

.place-list{

display:grid;

grid-template-columns:1fr 1fr;

gap:15px;

margin-top:20px;

}

.place{

padding:15px;

font-size:18px;

border-radius:15px;

background:white;

cursor:pointer;

transition:.3s;

}

.place:hover{

background:#ff4d8d;

color:white;

transform:scale(1.05);

}

/* Heart Animation */

.heart{

position:fixed;

top:-50px;

font-size:30px;

animation:fall linear forwards;

pointer-events:none;

z-index:999;

}

@keyframes fall{

0%{

transform:translateY(-100px) rotate(0deg);

opacity:1;

}

100%{

transform:translateY(110vh) rotate(360deg);

opacity:0;

}

}

/* Fade */

.card{

animation:fade .5s;

}

@keyframes fade{

from{

opacity:0;

transform:translateY(25px);

}

to{

opacity:1;

transform:translateY(0);

}

}

body::before,
body::after{

animation:floatBG 8s ease-in-out infinite alternate;

}

@keyframes floatBG{

from{

transform:translateY(0px);

}

to{

transform:translateY(40px);

}

}

.photo{

width:170px;

height:170px;

border-radius:50%;

object-fit:cover;

margin-bottom:20px;

box-shadow:0 10px 30px rgba(0,0,0,.25);

animation:zoom 1s;

}

@keyframes zoom{

from{

transform:scale(.4);

opacity:0;

}

to{

transform:scale(1);

opacity:1;

}

}

#countdown{

margin-top:25px;

font-size:22px;

font-weight:bold;

color:#ff4d8d;

}




</style>

</head>

<body>

<audio id="bgMusic" loop>
    <source src="music/love.mp3" type="audio/mpeg">
</audio>

<div class="card" id="card">

<h1>❤️</h1>

<h2>Would you go on a date with me?</h2>

<p>I have something special to ask you...</p>

<div class="buttons">

<button id="yes">YES</button>

<button id="no">NO</button>

</div>

</div>

<script>

const card = document.getElementById("card");

const yes = document.getElementById("yes");
const no = document.getElementById("no");

let count = 0;

// Tombol NO

no.onclick = function(){

    count++;

    if(count == 1){

        no.style.transform = "scale(.8)";
        yes.style.transform = "scale(1.1)";

    }

    else if(count == 2){

        no.style.transform = "scale(.6)";
        yes.style.transform = "scale(1.2)";

    }

    else{

        no.style.position = "fixed";

        no.style.left = Math.random() * (window.innerWidth-120) + "px";

        no.style.top = Math.random() * (window.innerHeight-60) + "px";

    }

}

// Tombol YES

yes.onclick = function(){

document.getElementById("bgMusic").play();


card.innerHTML = `

<h1>💕</h1>

<h2>Let's Plan Our Date</h2>

<p>Choose your schedule ❤️</p>

<label>Day</label><br><br>

<select id="day">

<option>Monday</option>
<option>Tuesday</option>
<option>Wednesday</option>
<option>Thursday</option>
<option>Friday</option>
<option selected>Saturday</option>
<option>Sunday</option>

</select>

<br><br>

<label>Date</label><br><br>

<input type="date" id="date">

<br><br>

<label>Time</label><br><br>

<input type="time" id="time">

<br><br>

<button id="continue">Continue ❤️</button>

`;

document.getElementById("continue").onclick = function(){

const day = document.getElementById("day").value;

const date = document.getElementById("date").value;

const time = document.getElementById("time").value;

card.innerHTML = `

<h1>📍</h1>

<h2>Where should we go?</h2>

<p>Choose your favorite place ❤️</p>

<div class="place-list">

<button class="place">☕ Cafe</button>

<button class="place">🍜 Restaurant</button>

<button class="place">🎬 Cinema</button>

<button class="place">🤹🏻 Milkyverse</button>

</div>

`;

const places = document.querySelectorAll(".place");

places.forEach(function(place){

    place.onclick = function(){

        const selectedPlace = this.innerText;

        card.innerHTML = `

        <h1>💖</h1>

        <h2>Our Date is Ready! Take a screenshoot and send the picture to Abyu</h2>

        <p><strong>Day:</strong> ${day}</p>

        <p><strong>Date:</strong> ${date}</p>

        <p><strong>Time:</strong> ${time}</p>

        <p><strong>Place:</strong> ${selectedPlace}</p>

        <br>

        <button id="confirm">Confirm Date ❤️</button>

        `;

        document.getElementById("confirm").onclick = function(){

createHearts();

confetti({

particleCount:250,

spread:180,

origin:{y:.6}

});

card.innerHTML=`

<img
src="images/photo.jpg"
class="photo">

<h2 id="finishTitle"></h2>

<p id="finishText"></p>

<div id="countdown"></div>

<p>

Thank you for accepting my invitation.

<br><br>

I can't wait to spend the day with you Grace!💕

</p>

<h3>See You Soon ✨</h3>

`;

}

    }

});

}

}

function createHearts(){

for(let i=0;i<70;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*window.innerWidth+"px";

heart.style.animationDuration=(Math.random()*3+2)+"s";

heart.style.fontSize=(Math.random()*20+15)+"px";

document.body.appendChild(heart);

setTimeout(()=>{

heart.remove();

},5000);

}

}

function startCountdown(){

const target=new Date("2026-07-12 19:00:00");

setInterval(function(){

const now=new Date();

const diff=target-now;

if(diff<0)return;

const days=Math.floor(diff/1000/60/60/24);

const hours=Math.floor(diff/1000/60/60)%24;

const minutes=Math.floor(diff/1000/60)%60;

const seconds=Math.floor(diff/1000)%60;

const cd=document.getElementById("countdown");

if(cd){

cd.innerHTML=

`⏳ ${days} Days ${hours} Hours ${minutes} Minutes ${seconds} Seconds`;

}

},1000);

}

</script>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

</body>
</html>
